{{ define "partials/input_password.html" }}

<div class="form-group {{ .field.FormGroupClass }}">
    <label class="control-label" for="{{ .field.ID }}"
           {{ if .field.Help }}data-toggle="popover" data-trigger="hover" title="{{ .field.Label }}" data-content="{{.field.Help}}"{{ end }}>{{ .field.Label }}
           {{ if .field.Attrs.required }}<i class="fas fa-asterisk fa-xs text-danger"></i>{{ end }}
           {{ if .field.Help }}<i class="fas fa-question-circle text-primary"></i>{{ end }}</label>
              <div class="input-group">
                     <input type="password" id="{{ .field.ID }}" name="{{ .field.Name }}" value="{{ .field.Value }}"
                                           class="form-control {{ template "partials/classes.html" . }}"
                                           {{ template "partials/attrs.html" .field }} />
                     <div class="input-group-append">
                            <button class="btn btn-outline-secondary"
                                                        type="button"
                                                        id="{{ .field.ID }}Toggle"
                                                        data-target="{{ .field.ID }}"
                                                        aria-label="Show password"
                                                        title="Show password">
                                   <i class="fas fa-eye" aria-hidden="true"></i>
                            </button>
                     </div>
              </div>
    <small id="{{ .field.ID }}Error" class="form-text text-danger">
      {{ .field.Error }}
    </small>
</div>

<script>
       (function() {
              var input = document.getElementById("{{ .field.ID }}");
              var toggle = document.getElementById("{{ .field.ID }}Toggle");
              if (!input || !toggle) {
                     return;
              }

              toggle.addEventListener("click", function() {
                     var isHidden = input.type === "password";
                     input.type = isHidden ? "text" : "password";

                     var icon = toggle.querySelector("i");
                     if (icon) {
                            icon.classList.toggle("fa-eye", !isHidden);
                            icon.classList.toggle("fa-eye-slash", isHidden);
                     }

                     var label = isHidden ? "Hide password" : "Show password";
                     toggle.setAttribute("aria-label", label);
                     toggle.setAttribute("title", label);
              });
       })();
</script>

{{ end }}
